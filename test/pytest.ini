[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    static: Layer 1 — static source checks, no imports needed
    unit:   Layer 2 — unit tests with mock data, no Kalshi needed
    smoke:  Layer 3 — smoke tests, may need Kalshi connection

# Show extra test summary info for failures
addopts = -ra

# Don't suppress warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
